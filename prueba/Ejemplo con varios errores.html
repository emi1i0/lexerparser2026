<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Ejemplo con varios errores</title>
</head>
<body>
  <h1>SMART HOME &mdash; Ejemplo con varios errores</h1>
  <div style="border: 1px solid green; padding: 20px;">
    <h2>sensor_luz: 2500lux</h2>
    <h2>sensor_movimiento: ON</h2>
    <h2>sensor_temp_int: 56°C</h2>
    <h2>sensor_humo: TRUE</h2>
  </div>
  <div style="border: 1px solid gray; padding: 20px;">
    <h1>aire_acondicionado</h1>
    <ul>
      <li>estado: ON</li>
      <li>modo: VENT</li>
      <li>temp_obj: 22°C</li>
    </ul>
  </div>
  <div style="border: 1px solid gray; padding: 20px;">
    <h1>cerradura_principal</h1>
    <ul>
      <li>estado: OFF</li>
    </ul>
  </div>
  <div style="border: 1px solid gray; padding: 20px;">
    <h1>persiana_comedor</h1>
    <ul>
      <li>posicion: 100%</li>
    </ul>
  </div>
</body>
</html>
